<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>６年国語「聞いて、考えを深めよう」学習ナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #e2e8f0;
            background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 20px 20px;
            color: #1e293b;
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .btn-3d {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            top: 0;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }
        .btn-3d:active {
            top: 4px;
            box-shadow: 0 0px 0px transparent !important;
        }

        .step-content {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 15px;
            animation: fadeIn 0.3s ease-out;
        }
        .step-content.active { display: flex; flex-direction: column; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border: 2px solid #e2e8f0;
            box-shadow: 0 6px 0 rgba(203, 213, 225, 0.4);
        }

        textarea, input[type="text"] {
            border: 3px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.8rem;
            font-size: 1.1rem;
            background: #f8fafc;
        }

        .nav-button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            cursor: pointer;
        }
        .nav-button.active { color: #059669; }
        .icon-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .nav-button.active .icon-circle {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }

        /* 印刷専用設定 */
        #print-container {
            display: none;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body {
                background: white;
                height: 100%;
                overflow: hidden !important;
            }
            main, nav, header, .no-print {
                display: none !important;
            }
            #print-container {
                display: block !important;
                width: 210mm;
                height: 297mm;
                padding: 10mm;
                position: fixed;
                top: 0;
                left: 0;
                background: white;
                z-index: 9999;
                box-sizing: border-box;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>

    <header class="bg-white border-b-4 border-gray-200 px-6 py-2 flex items-center justify-between no-print z-10">
        <h1 class="text-lg font-bold text-emerald-600">👂 インタビュー学習ナビ</h1>
        <div class="flex gap-2">
            <button onclick="exportData()" class="btn-3d text-[10px] bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-xl font-bold">📥 保存</button>
            <label class="btn-3d text-[10px] bg-fuchsia-100 text-fuchsia-700 px-3 py-1.5 rounded-xl font-bold cursor-pointer">
                📤 復元
                <input type="file" class="hidden" accept=".json" onchange="importData(event)">
            </label>
        </div>
    </header>

    <main class="flex-1 overflow-hidden relative no-print">
        <section id="step-1" class="step-content active">
            <div class="card border-t-8 border-t-emerald-400">
                <h2 class="text-xl font-bold text-emerald-700 mb-4 flex items-center gap-2">一．計画</h2>
                <div class="space-y-4 flex flex-col flex-1">
                    <input type="text" id="target" placeholder="相手の名前" oninput="onDataInput()">
                    <textarea id="goal" class="flex-1" placeholder="目的" oninput="onDataInput()"></textarea>
                </div>
            </div>
        </section>

        <section id="step-2" class="step-content">
            <div class="card border-t-8 border-t-sky-400">
                <h2 class="text-xl font-bold text-sky-700 mb-4">二．準備</h2>
                <div class="flex-1 overflow-y-auto" id="question-inputs"></div>
                <button onclick="addQuestionField()" class="btn-3d mt-3 w-full py-3 bg-sky-50 text-sky-600 font-bold rounded-2xl">＋ 質問追加</button>
            </div>
        </section>

        <section id="step-3" class="step-content">
            <div class="flex flex-col md:flex-row gap-4 h-full">
                <div class="md:w-1/3 flex flex-col gap-3">
                    <div class="card border-t-4 border-t-amber-400 flex-1 overflow-hidden">
                        <h3 class="font-bold text-slate-500 mb-2 text-sm">📋 質問</h3>
                        <div id="question-reference" class="overflow-y-auto space-y-1"></div>
                    </div>
                </div>
                <div class="md:w-2/3 flex flex-col h-full">
                    <div class="card border-t-8 border-t-rose-400">
                        <div class="flex justify-between items-start mb-2">
                            <h2 id="active-question-label" class="text-sm font-bold text-rose-600 italic">選んでください</h2>
                            <div id="timer" class="font-mono text-sm bg-slate-100 px-2 py-0.5 rounded">00:00</div>
                        </div>
                        <textarea id="memo-field" class="flex-1 border-rose-100" oninput="onMemoInput()"></textarea>
                        <button onclick="toggleTimer()" id="timer-btn" class="btn-3d mt-2 bg-rose-500 text-white py-2 rounded-xl text-xs font-bold">タイマー開始</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="step-4" class="step-content">
            <div class="card border-t-8 border-t-indigo-500">
                <h2 class="text-xl font-bold text-indigo-700 mb-3">四．まとめ</h2>
                <div class="flex-1 flex flex-col gap-3">
                    <textarea id="result-text" class="flex-1" placeholder="わかったこと" oninput="onDataInput()"></textarea>
                    <textarea id="change-text" class="flex-1" placeholder="考えの変化" oninput="onDataInput()"></textarea>
                </div>
                <button onclick="generatePDF()" class="btn-3d w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold mt-4 shadow-lg text-lg">
                    📄 報告書を提出（A4一枚）
                </button>
            </div>
        </section>
    </main>

    <nav class="bg-white border-t-2 border-slate-200 px-4 py-2 flex justify-around no-print shadow-lg pb-6">
        <button onclick="showStep(1)" class="nav-button active" id="nav-btn-1"><div class="icon-circle">1</div>計画</button>
        <button onclick="showStep(2)" class="nav-button" id="nav-btn-2"><div class="icon-circle">2</div>準備</button>
        <button onclick="showStep(3)" class="nav-button" id="nav-btn-3"><div class="icon-circle">3</div>実践</button>
        <button onclick="showStep(4)" class="nav-button" id="nav-btn-4"><div class="icon-circle">4</div>まとめ</button>
    </nav>

    <div id="print-container">
        <div id="pdf-content"></div>
    </div>

    <script>
        let currentStep = 1;
        let questions = []; 
        let questionMemos = { "-1": "" }; 
        let activeQuestionId = "-1";
        let timerInterval, seconds = 0, timerRunning = false;

        window.onload = () => { loadData(); updateStepView(); };

        function showStep(n) { currentStep = n; updateStepView(); }

        function updateStepView() {
            document.querySelectorAll('.step-content').forEach((el, idx) => el.classList.toggle('active', idx + 1 === currentStep));
            document.querySelectorAll('.nav-button').forEach((btn, idx) => btn.classList.toggle('active', idx + 1 === currentStep));
            if (currentStep === 3) updateQuestionReference();
        }

        function addQuestionField(text = "") {
            const id = "q-" + Date.now() + Math.random().toString(36).substr(2, 4);
            questions.push({ id, text });
            renderQuestionInputs();
            onDataInput();
        }

        function renderQuestionInputs() {
            const container = document.getElementById('question-inputs');
            container.innerHTML = "";
            questions.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = "flex gap-2 mb-2 items-center";
                div.innerHTML = `<div class="text-xs font-bold w-4">${i+1}</div>
                    <input type="text" class="flex-1 text-sm p-2" value="${q.text}" oninput="questions[${i}].text=this.value;onDataInput()">
                    <button onclick="questions.splice(${i},1);renderQuestionInputs();onDataInput()" class="text-rose-400 px-2">×</button>`;
                container.appendChild(div);
            });
        }

        function updateQuestionReference() {
            const ref = document.getElementById('question-reference');
            let html = `<div class="q-ref-item ${activeQuestionId === '-1' ? 'active' : ''}" onclick="selectQuestion('-1')">全体メモ</div>`;
            questions.forEach(q => {
                if (!q.text) return;
                html += `<div class="q-ref-item ${activeQuestionId === q.id ? 'active' : ''}" onclick="selectQuestion('${q.id}')">${q.text}</div>`;
            });
            ref.innerHTML = html;
        }

        function selectQuestion(id) {
            activeQuestionId = id;
            const label = document.getElementById('active-question-label');
            const field = document.getElementById('memo-field');
            if (id === "-1") label.innerText = "📋 全体のメモ";
            else {
                const q = questions.find(item => item.id === id);
                label.innerText = `💬 質問：${q ? q.text : ''}`;
            }
            field.value = questionMemos[id] || "";
            updateQuestionReference();
        }

        function onMemoInput() { 
            questionMemos[activeQuestionId] = document.getElementById('memo-field').value; 
            onDataInput(); 
        }

        function onDataInput() {
            const data = {
                target: document.getElementById('target').value,
                goal: document.getElementById('goal').value,
                result: document.getElementById('result-text').value,
                change: document.getElementById('change-text').value,
                questions, questionMemos, activeQuestionId
            };
            localStorage.setItem('kiite_loilo_master', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('kiite_loilo_master');
            if (!saved) { for(let i=0; i<3; i++) addQuestionField(); return; }
            const data = JSON.parse(saved);
            document.getElementById('target').value = data.target || '';
            document.getElementById('goal').value = data.goal || '';
            document.getElementById('result-text').value = data.result || '';
            document.getElementById('change-text').value = data.change || '';
            questions = data.questions || [];
            questionMemos = data.questionMemos || { "-1": "" };
            activeQuestionId = data.activeQuestionId || "-1";
            renderQuestionInputs();
        }

        function generatePDF() {
            const data = JSON.parse(localStorage.getItem('kiite_loilo_master'));
            const container = document.getElementById('print-container');
            const content = document.getElementById('pdf-content');
            
            let qAndA = "";
            data.questions.forEach((q, i) => {
                if (!q.text.trim()) return;
                qAndA += `<div style="margin-bottom: 8px; border-bottom: 1px dotted #ccc; padding-bottom: 4px;">
                    <p style="font-weight: bold; margin: 0; color: #047857; font-size: 11pt;">問 ${i+1}: ${q.text}</p>
                    <p style="margin: 4px 0 0 20px; font-size: 10.5pt;">答： ${data.questionMemos[q.id] || '（なし）'}</p>
                </div>`;
            });

            content.innerHTML = `
                <div id="pdf-inner" style="line-height: 1.5; color: #0f172a;">
                    <div style="border-bottom: 3px solid #10b981; padding-bottom: 5px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-end;">
                        <h1 style="font-size: 20pt; margin: 0; font-weight: bold; color: #064e3b;">インタビュー報告書</h1>
                        <p style="font-size: 11pt; margin: 0;">氏名：<span style="display:inline-block; width:120px; border-bottom:1px solid #000;"></span></p>
                    </div>
                    <div style="background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 12px;">
                        <p style="margin:4px 0;"><strong>【相手】</strong> ${data.target || '（未入力）'}</p>
                        <p style="margin:4px 0;"><strong>【目的】</strong> ${data.goal || '（未入力）'}</p>
                    </div>
                    <div style="border: 2px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
                        <h2 style="font-size: 12pt; margin: 0 0 10px 0; color: #047857; border-left: 5px solid #10b981; padding-left: 10px;">聞き取りの記録</h2>
                        ${qAndA}
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div style="background: #eff6ff; border: 2px solid #bfdbfe; border-radius: 8px; padding: 10px;">
                            <h3 style="font-size: 11pt; margin: 0 0 8px 0; color: #1e40af;">三．わかったこと</h3>
                            <p style="white-space: pre-wrap; font-size: 10pt; margin: 0;">${data.result || '（未入力）'}</p>
                        </div>
                        <div style="background: #fdf4ff; border: 2px solid #fbcfe8; border-radius: 8px; padding: 10px;">
                            <h3 style="font-size: 11pt; margin: 0 0 8px 0; color: #be185d;">四．考えの変化</h3>
                            <p style="white-space: pre-wrap; font-size: 10pt; margin: 0;">${data.change || '（未入力）'}</p>
                        </div>
                    </div>
                </div>
            `;

            container.style.display = "block";
            const inner = document.getElementById('pdf-inner');
            const maxHeight = 1000; 
            let fontSize = 11;
            inner.style.fontSize = fontSize + "pt";

            while (inner.scrollHeight > maxHeight && fontSize > 6) {
                fontSize -= 0.1;
                inner.style.fontSize = fontSize + "pt";
            }
            
            window.print();
            container.style.display = "none";
        }

        function toggleTimer() {
            if (timerRunning) { clearInterval(timerInterval); }
            else {
                timerInterval = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds/60).toString().padStart(2,'0'), s=(seconds%60).toString().padStart(2,'0');
                    document.getElementById('timer').textContent = `${m}:${s}`;
                }, 1000);
            }
            timerRunning = !timerRunning;
        }

        function insertText(id, text) {
            const el = document.getElementById(id);
            el.value += text; onDataInput(); el.focus();
        }

        function exportData() {
            const blob = new Blob([localStorage.getItem('kiite_loilo_master')], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `インタビュー記録.json`; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (e) => { localStorage.setItem('kiite_loilo_master', e.target.result); location.reload(); };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
