<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>６年国語「聞いて、考えを深めよう」学習ナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #f0f4f8;
            color: #1a202c;
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .step-content {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            animation: fadeIn 0.3s ease-out;
        }

        .step-content.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            margin-bottom: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        textarea, input[type="text"] {
            border: 2px solid #edf2f7;
            border-radius: 1rem;
            padding: 1rem;
            font-size: 1.1rem;
            background: #fdfdfd;
        }

        .nav-button {
            flex: 1;
            padding: 0.8rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #a0aec0;
            border-radius: 1rem;
        }

        .nav-button.active {
            color: #2f855a;
            background: #f0fff4;
        }

        .icon-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #edf2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .nav-button.active .icon-circle {
            background: #48bb78;
            color: white;
        }

        /* 印刷・A4一枚収束用スタイル */
        #print-container {
            display: none;
            width: 210mm;
            height: 296mm; /* A4高さよりわずかに小さくしてマージンを確保 */
            padding: 15mm;
            background: white;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body {
                background: white;
                height: auto;
                overflow: visible !important;
            }
            .no-print { display: none !important; }
            #print-container {
                display: block !important;
                z-index: 9999;
                position: static;
                page-break-after: avoid;
                overflow: hidden;
            }
        }

        .ref-area {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1rem;
            overflow-y: auto;
            border: 1px solid #edf2f7;
        }

        .q-ref-item {
            cursor: pointer;
            border: 2px solid transparent;
            background: white;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
        }

        .q-ref-item.active {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .memo-display-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <header class="bg-white border-b px-6 py-2 flex items-center justify-between no-print shadow-sm z-10">
        <h1 class="text-lg font-bold text-green-800">👂 インタビュー学習ナビ</h1>
        <div class="flex gap-2">
            <button onclick="exportData()" class="text-[10px] bg-gray-100 px-3 py-1.5 rounded-full font-bold">📥 保存</button>
            <label class="text-[10px] bg-gray-100 px-3 py-1.5 rounded-full font-bold cursor-pointer">
                📤 復元
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
            </label>
        </div>
    </header>

    <!-- メイン -->
    <main class="flex-1 overflow-hidden relative">
        
        <!-- STEP 1 -->
        <section id="step-1" class="step-content active">
            <div class="card">
                <h2 class="text-xl font-bold text-green-700 mb-4">一．インタビューの計画</h2>
                <div class="space-y-4 flex-1 flex flex-col">
                    <div class="flex flex-col">
                        <label class="text-xs font-bold text-gray-400 mb-1">相手</label>
                        <input type="text" id="target" placeholder="だれに聞きますか？" oninput="onDataInput()">
                    </div>
                    <div class="flex-1 flex flex-col">
                        <label class="text-xs font-bold text-gray-400 mb-1">目的</label>
                        <textarea id="goal" class="flex-1" placeholder="何を知りたいですか？" oninput="onDataInput()"></textarea>
                    </div>
                </div>
            </div>
        </section>

        <!-- STEP 2 -->
        <section id="step-2" class="step-content">
            <div class="card">
                <h2 class="text-xl font-bold text-green-700 mb-4">二．質問の準備</h2>
                <div class="flex-1 overflow-y-auto" id="question-inputs">
                    <!-- 動的追加 -->
                </div>
                <button onclick="addQuestionField()" class="mt-4 w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-400 font-bold">＋ 質問を追加</button>
            </div>
        </section>

        <!-- STEP 3 -->
        <section id="step-3" class="step-content">
            <div class="flex flex-col md:flex-row gap-4 h-full">
                <div class="md:w-1/3 flex flex-col no-print">
                    <div class="card">
                        <h3 class="font-bold text-gray-500 mb-2 text-sm">📋 質問リスト</h3>
                        <div id="question-reference" class="ref-area flex-1"></div>
                    </div>
                </div>
                <div class="md:w-2/3 flex flex-col h-full">
                    <div class="card border-l-8 border-red-400">
                        <div class="flex justify-between items-start mb-2">
                            <h2 id="active-question-label" class="text-sm font-bold text-red-600 italic">質問を選んでください</h2>
                            <div id="timer" class="font-mono text-sm font-bold bg-gray-100 px-2 py-1 rounded">00:00</div>
                        </div>
                        <textarea id="memo-field" class="flex-1 border-red-50" placeholder="メモを記入..." oninput="onMemoInput()"></textarea>
                        <button onclick="toggleTimer()" id="timer-btn" class="mt-2 bg-red-500 text-white py-2 rounded-xl text-xs font-bold">タイマー開始/停止</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- STEP 4 -->
        <section id="step-4" class="step-content">
            <div class="flex flex-col md:flex-row gap-4 h-full">
                <div class="md:w-1/3 flex flex-col no-print">
                    <div class="card">
                        <h3 class="font-bold text-gray-500 mb-2 text-sm">🧐 メモのふりかえり</h3>
                        <div id="summary-memo-reference" class="ref-area flex-1 space-y-2"></div>
                    </div>
                </div>
                <div class="md:w-2/3 flex flex-col h-full">
                    <div class="card border-l-8 border-blue-500">
                        <h2 class="text-xl font-bold text-blue-700 mb-4">四．考えを深める</h2>
                        <div class="flex-1 flex flex-col gap-4">
                            <div class="flex-1 flex flex-col">
                                <label class="text-xs font-bold text-gray-400 mb-1">わかったこと</label>
                                <textarea id="result-text" class="flex-1" oninput="onDataInput()"></textarea>
                            </div>
                            <div class="flex-1 flex flex-col">
                                <label class="text-xs font-bold text-gray-400 mb-1">自分の考えの変化</label>
                                <textarea id="change-text" class="flex-1" oninput="onDataInput()"></textarea>
                            </div>
                        </div>
                        <div class="mt-4 flex flex-col gap-3">
                            <div class="flex gap-2">
                                <button onclick="insertText('change-text', '前は〜と思っていました。')" class="text-[9px] bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1 rounded-lg font-bold">前は〜</button>
                                <button onclick="insertText('change-text', 'これからは〜したいです。')" class="text-[9px] bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1 rounded-lg font-bold">これからは〜</button>
                            </div>
                            <button onclick="generatePDF()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                                📄 A4一枚でPDF出力（ロイロ提出用）
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 下部ナビ -->
    <nav class="bg-white border-t px-2 py-1 flex justify-around no-print shadow-lg">
        <button onclick="showStep(1)" class="nav-button active" id="nav-btn-1">
            <div class="icon-circle">1</div>
            <span class="text-[9px] font-bold">計画</span>
        </button>
        <button onclick="showStep(2)" class="nav-button" id="nav-btn-2">
            <div class="icon-circle">2</div>
            <span class="text-[9px] font-bold">準備</span>
        </button>
        <button onclick="showStep(3)" class="nav-button" id="nav-btn-3">
            <div class="icon-circle">3</div>
            <span class="text-[9px] font-bold">実践</span>
        </button>
        <button onclick="showStep(4)" class="nav-button" id="nav-btn-4">
            <div class="icon-circle">4</div>
            <span class="text-[9px] font-bold">まとめ</span>
        </button>
    </nav>

    <!-- 印刷用コンテナ（非表示） -->
    <div id="print-container">
        <div id="pdf-content">
            <!-- ここに自動生成されます -->
        </div>
    </div>

    <div id="save-toast" class="fixed top-14 right-4 bg-black/70 text-white px-3 py-1 rounded-full text-[10px] opacity-0 transition-opacity pointer-events-none z-50">
        保存済み
    </div>

    <script>
        let currentStep = 1;
        let timerInterval;
        let seconds = 0;
        let timerRunning = false;
        let activeQuestionIndex = -1; 
        let questionMemos = {}; 

        window.onload = () => {
            loadData();
            updateStepView();
        };

        function showStep(n) {
            currentStep = n;
            updateStepView();
        }

        function updateStepView() {
            document.querySelectorAll('.step-content').forEach((el, idx) => {
                el.classList.toggle('active', idx + 1 === currentStep);
            });
            document.querySelectorAll('.nav-button').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === currentStep);
            });

            if (currentStep === 3) updateQuestionReference();
            if (currentStep === 4) updateSummaryMemoReference();
        }

        function addQuestionField(value = "") {
            const container = document.getElementById('question-inputs');
            const div = document.createElement('div');
            div.className = "flex gap-2 mb-2";
            div.innerHTML = `
                <input type="text" class="question-input flex-1" value="${value}" placeholder="質問..." oninput="onDataInput()">
                <button onclick="this.parentElement.remove(); onDataInput();" class="text-red-400 px-2">✕</button>
            `;
            container.appendChild(div);
        }

        function updateQuestionReference() {
            const refContainer = document.getElementById('question-reference');
            const questions = getQuestionList();
            let html = `<div class="q-ref-item ${activeQuestionIndex === -1 ? 'active' : ''}" onclick="selectQuestion(-1)">全体メモ</div>`;
            questions.forEach((q, i) => {
                html += `<div class="q-ref-item ${activeQuestionIndex === i ? 'active' : ''}" onclick="selectQuestion(${i})">${i+1}. ${q}</div>`;
            });
            refContainer.innerHTML = html;
        }

        function updateSummaryMemoReference() {
            const container = document.getElementById('summary-memo-reference');
            const questions = getQuestionList();
            let html = "";
            if (questionMemos[-1]) html += `<div class="memo-display-card"><p class="text-[9px] text-gray-400">全体メモ</p><p class="text-xs">${questionMemos[-1]}</p></div>`;
            questions.forEach((q, i) => {
                if (questionMemos[i]) html += `<div class="memo-display-card border-l-4 border-green-500"><p class="text-[9px] text-green-600">${q}</p><p class="text-xs">${questionMemos[i]}</p></div>`;
            });
            container.innerHTML = html || '<p class="text-center text-gray-400 text-xs">メモなし</p>';
        }

        function getQuestionList() {
            return Array.from(document.querySelectorAll('.question-input')).map(input => input.value.trim()).filter(v => v !== "");
        }

        function selectQuestion(index) {
            activeQuestionIndex = index;
            const label = document.getElementById('active-question-label');
            const field = document.getElementById('memo-field');
            const questions = getQuestionList();
            label.innerText = index === -1 ? "全体のメモを記録中" : `質問 ${index+1} の答えを記録中`;
            field.value = questionMemos[index] || "";
            updateQuestionReference();
        }

        function onMemoInput() {
            questionMemos[activeQuestionIndex] = document.getElementById('memo-field').value;
            onDataInput();
        }

        function insertText(id, text) {
            document.getElementById(id).value += text;
            onDataInput();
        }

        function toggleTimer() {
            if (timerRunning) clearInterval(timerInterval);
            else {
                timerInterval = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    const s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timer').textContent = `${m}:${s}`;
                }, 1000);
            }
            timerRunning = !timerRunning;
        }

        // --- ロイロ提出用・A4一枚収束ロジック ---
        function generatePDF() {
            const data = getAppData();
            const container = document.getElementById('print-container');
            const content = document.getElementById('pdf-content');
            
            let qAndA = "";
            data.questions.forEach((q, i) => {
                if (q.trim()) {
                    qAndA += `
                        <div style="margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 4px;">
                            <p style="font-weight: bold; margin: 0; color: #2d5d3d;">問 ${i+1}: ${q}</p>
                            <p style="margin: 2px 0 0 10px; white-space: pre-wrap;">答: ${data.questionMemos[i] || '（未記入）'}</p>
                        </div>
                    `;
                }
            });

            // HTMLの構築
            content.innerHTML = `
                <div id="pdf-inner" style="font-size: 11pt; line-height: 1.5;">
                    <div style="border-bottom: 2px solid #2d5d3d; padding-bottom: 5px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end;">
                        <h1 style="font-size: 18pt; margin: 0;">インタビュー報告書</h1>
                        <p style="font-size: 10pt; margin: 0;">国語「聞いて、考えを深めよう」</p>
                    </div>
                    <div style="display: flex; gap: 20px; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
                        <p style="margin: 0;"><strong>相手：</strong> ${data.target || '未記入'}</p>
                        <p style="margin: 0;"><strong>目的：</strong> ${data.goal || '未記入'}</p>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <h3 style="font-size: 12pt; border-left: 4px solid #2d5d3d; padding-left: 8px; margin-bottom: 8px; background: #f0f7f2;">聞き取りの記録</h3>
                        <div style="padding-left: 5px;">${qAndA}</div>
                        ${data.questionMemos[-1] ? `<p style="font-size: 9pt; color: #666; margin-top: 5px;">備考: ${data.questionMemos[-1]}</p>` : ''}
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div style="border: 1px solid #ccc; padding: 10px; border-radius: 8px;">
                            <h3 style="font-size: 11pt; margin-top: 0; color: #2b6cb0;">相手の考え・わかったこと</h3>
                            <p style="white-space: pre-wrap; font-size: 10pt;">${data.result || '未記入'}</p>
                        </div>
                        <div style="border: 1px solid #ccc; padding: 10px; border-radius: 8px;">
                            <h3 style="font-size: 11pt; margin-top: 0; color: #2b6cb0;">自分の考えの変化</h3>
                            <p style="white-space: pre-wrap; font-size: 10pt;">${data.change || '未記入'}</p>
                        </div>
                    </div>
                </div>
            `;

            // フォントサイズ調整ロジック (A4一枚に収める)
            container.style.display = "block"; // 計算のために一時表示
            const inner = document.getElementById('pdf-inner');
            const maxHeight = container.clientHeight - 80; // マージン考慮
            let fontSize = 11;

            while (inner.scrollHeight > maxHeight && fontSize > 6) {
                fontSize -= 0.2;
                inner.style.fontSize = fontSize + "pt";
            }
            
            // 印刷実行
            window.print();
            container.style.display = "none";
        }

        // --- 保存・読み込み ---
        function onDataInput() {
            localStorage.setItem('interview_loilo_data', JSON.stringify(getAppData()));
            const toast = document.getElementById('save-toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 800);
        }

        function getAppData() {
            return {
                target: document.getElementById('target').value,
                goal: document.getElementById('goal').value,
                result: document.getElementById('result-text').value,
                change: document.getElementById('change-text').value,
                questions: Array.from(document.querySelectorAll('.question-input')).map(q => q.value),
                questionMemos: questionMemos,
                activeQuestionIndex: activeQuestionIndex
            };
        }

        function loadData() {
            const saved = localStorage.getItem('interview_loilo_data');
            if (!saved) { for(let i=0; i<3; i++) addQuestionField(); return; }
            const data = JSON.parse(saved);
            document.getElementById('target').value = data.target || '';
            document.getElementById('goal').value = data.goal || '';
            document.getElementById('result-text').value = data.result || '';
            document.getElementById('change-text').value = data.change || '';
            questionMemos = data.questionMemos || {};
            activeQuestionIndex = data.activeQuestionIndex || -1;
            const container = document.getElementById('question-inputs');
            container.innerHTML = '';
            if (data.questions) data.questions.forEach(q => addQuestionField(q));
            else for(let i=0; i<3; i++) addQuestionField();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(getAppData(), null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `インタビュー学習記録.json`;
            a.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('interview_loilo_data', e.target.result);
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }
    </script>
</body>
</html>
